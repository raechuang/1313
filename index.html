  <!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>♡♡♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15110d;
    --card: #1c1610;
    --border: #392c1e;
    --amber: #ffb238;
    --amber-dim: #c98a2c;
    --amber-soft: rgba(255, 178, 56, 0.14);
    --text-muted: #8c7a63;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top, rgba(255,178,56,0.06), transparent 60%);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
    font-family: 'Space Grotesk', sans-serif;
  }

  .stage {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .terminal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow:
      0 0 0 1px rgba(255,178,56,0.04),
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 0 40px -10px var(--amber-soft);
    overflow: hidden;
    position: relative;
  }

  .terminal::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    opacity: 0.5;
  }

  .terminal__bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--border);
  }

  .terminal__label {
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  .terminal__body {
    padding: 20px 18px 16px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--amber);
    min-height: 220px;
    display: flex;
    flex-direction: column;
  }

  /* 修正：優化滾動區塊，確保 iOS 滾動滑順 */
  #log {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }

  /* 修正：強迫字體在任何裝置不允許中途斷行，維持圖案完整 */
  .log-line {
    white-space: pre;
    word-break: keep-all;
    overflow-wrap: normal;
    font-size: clamp(10px, 2.8vw, 15px);
    line-height: 1.4;
  }

  /* 針對電腦或大螢幕平板優化字級 */
  @media (min-width: 768px) {
    .log-line {
      font-size: 16px;
      line-height: 1.55;
    }
  }

  .log-line.echo {
    color: var(--amber-dim);
    opacity: 0.85;
  }

  .log-line.system {
    color: var(--text-muted);
    font-style: italic;
  }

  .log-line.art {
    color: var(--amber);
    text-shadow: 0 0 14px rgba(255,178,56,0.35);
  }

  .log-line.enter {
    animation: reveal 220ms ease-out both;
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .log-line.enter { animation: none; }
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: clamp(13px, 3.6vw, 16px);
    flex-wrap: nowrap;
  }

  .submit-btn {
    flex-shrink: 0;
    background: var(--amber-soft);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(12px, 3.2vw, 14px);
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
  }

  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .submit-btn:active:not(:disabled) {
    background: rgba(255,178,56,0.28);
  }

  .prompt-glyph {
    color: var(--amber-dim);
    flex-shrink: 0;
  }

  #numInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    font-size: inherit;
    caret-color: var(--amber);
  }

  #numInput::placeholder {
    color: var(--text-muted);
    opacity: 0.7;
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="terminal">
      <div class="terminal__bar">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="terminal__label">main.py — 執行中</span>
      </div>
      <div class="terminal__body">
        <div id="log"></div>
        <form id="inputForm" class="input-row" autocomplete="off">
          <span class="prompt-glyph">&gt;&gt;&gt;</span>
          <input id="numInput" type="search" inputmode="numeric" placeholder="輸入數字" />
          <button type="submit" class="submit-btn">送出</button>
        </form>
      </div>
    </div>
    <p class="hint">這是用 Python 的 print() 一行一行刻出來的圖案，輸入「3」後按「送出」看看。</p>
  </div>

<script>
  const log = document.getElementById('log');
  const form = document.getElementById('inputForm');
  const input = document.getElementById('numInput');
  const submitBtn = document.querySelector('.submit-btn'); 
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const gap = "   ";
  const pattern = [
    "5555555" + gap + "  2222  2222  " + gap + "3333333",
    "  5 5  " + gap + "22222222222222" + gap + "    3 3",
    "  5 5  " + gap + "22222222222222" + gap + "    3 3",
    "  5 5  " + gap + "22222222222222" + gap + "3333333",
    "  5 5  " + gap + "  2222222222  " + gap + "    3 3",
    "  5 5  " + gap + "    222222    " + gap + "    3 3",
    "5555555" + gap + "      22      " + gap + "3333333",
  ];

  let busy = false;

  function addLine(text, className, animate) {
    const div = document.createElement('div');
    div.className = 'log-line' + (className ? ' ' + className : '') + (animate && !reduceMotion ? ' enter' : '');
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, reduceMotion ? 0 : ms));
  }

  async function handleSubmit(value) {
    busy = true;
    
    // 【關鍵修正 1】改用 readOnly，不和 iOS 的鍵盤焦點機制硬碰硬
    input.readOnly = true; 
    // 【關鍵修正 2】同步鎖定按鈕，防止重複觸發
    if (submitBtn) submitBtn.disabled = true;

    addLine('>>> ' + value, 'echo', false);

    const trimmed = value.trim();

    if (trimmed === '3') {
      await wait(220);
      for (const line of pattern) {
        const el = addLine(line, 'art', true);
        // 【關鍵修正 3】強迫滾動，就算被虛擬鍵盤擠壓，畫面也會把圖案推上來
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        await wait(80);
      }
    } else if (trimmed === '') {
      // 空輸入不回應
    } else {
      await wait(150);
      const el = addLine('沒有對應這個數字的圖案。', 'system', true);
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    busy = false;
    // 【關鍵修正 4】釋放狀態
    input.readOnly = false;
    if (submitBtn) submitBtn.disabled = false;
    
    input.value = '';
    input.focus();
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (busy) return;
    const value = input.value;
    if (!value) return;
    handleSubmit(value);
  });

  input.focus();
</script>

</body>
</html>
